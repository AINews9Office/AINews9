substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: pragya-api
  _ARTIFACT_REPOSITORY: pragya
  _IMAGE_NAME: pragya-api
  _PRAGYA_CHAT_MODEL: gpt-4.1-mini
  _OPENAI_API_KEY_SECRET: pragya-openai-api-key

steps:
  - name: gcr.io/cloud-builders/docker
    id: Build image
    args:
      - build
      - --file
      - Dockerfile
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    id: Push image
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: Deploy Cloud Run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --set-env-vars
      - PRAGYA_CHAT_MODEL=${_PRAGYA_CHAT_MODEL}
      - --set-secrets
      - OPENAI_API_KEY=${_OPENAI_API_KEY_SECRET}:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
