substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: ai-news-service
  _ARTIFACT_REPOSITORY: pragya
  _IMAGE_NAME: ai-news-service
  _RUNTIME_SERVICE_ACCOUNT: pragya-runtime@ainews9-pragya.iam.gserviceaccount.com
  _NEWS_API_KEY_SECRET: ai-news-newsapi-key
  _GNEWS_API_KEY_SECRET: ai-news-gnews-api-key

steps:
  - name: gcr.io/cloud-builders/docker
    id: Build image
    dir: AI_News_Service
    args:
      - build
      - --file
      - Dockerfile
      - --tag
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    id: Push image
    dir: AI_News_Service
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: Deploy Cloud Run
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --service-account
      - ${_RUNTIME_SERVICE_ACCOUNT}
      - --allow-unauthenticated
      - --port
      - "8080"
      - --set-secrets
      - NEWS_API_KEY=${_NEWS_API_KEY_SECRET}:latest,GNEWS_API_KEY=${_GNEWS_API_KEY_SECRET}:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
